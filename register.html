<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Registrar</title></head>
<body>
  <h1>Registrar Movimiento</h1>
  <form id="form">
    <label>Motivo: <input type="text" id="motivo" required /></label><br/>
    <label>Cantidad: <input type="number" id="cantidad" required step="0.01" /></label><br/>
    <label>
      Categoría:
      <select id="categoria" required>
        <option value="">Selecciona una categoría</option>
        <option value="1">INGRESO</option>
        <option value="2">COMIDA</option>
        <option value="3">TRANSPORTE</option>
        <option value="4">SERVICIOS</option>
        <option value="5">VIVIENDA</option>
        <option value="6">ROPA</option>
        <option value="7">ENTRETENIMIENTO</option>
        <option value="8">SALUD</option>
        <option value="9">EDUCACION</option>
        <option value="10">EXTRAS</option>
      </select>
    </label>
    <button type="submit">Enviar</button>
  </form>

    <a href="/index.html">Pagina principal</a>

  <script>
    const form = document.getElementById('form');
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const motivo = document.getElementById('motivo').value;
      let cantidad = parseFloat(document.getElementById('cantidad').value);
      const categoria = document.getElementById('categoria').value;

      if(categoria != 1){
        cantidad *= -1;
      } 

      await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ motivo, cantidad, categoria }),
      });

      alert("Movimiento guardado");
      form.reset();
    });
  </script>
</body>
</html>
