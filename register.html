<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Registrar</title></head>
<body>
  <h1>Registrar Movimiento</h1>
  <form id="form">
    <label>Motivo: <input type="text" id="motivo" required /></label><br/>
    <label>Cantidad: <input type="number" id="cantidad" required step="0.01" /></label><br/>
    <button type="submit">Enviar</button>
  </form>

  <script>
    const form = document.getElementById('form');
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const motivo = document.getElementById('motivo').value;
      const cantidad = parseFloat(document.getElementById('cantidad').value);

      await fetch('/register_event', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ motivo, cantidad }),
      });

      alert("Movimiento guardado");
      form.reset();
    });
  </script>
</body>
</html>
