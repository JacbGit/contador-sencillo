<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Movimientos</title>

<style>

body{
  font-family: Arial, sans-serif;
  margin:20px;
}

h1{
  text-align:center;
}

.topbar{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.total{
  font-size:1.2rem;
  font-weight:bold;
}

.filtro{
  margin-top:10px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border:1px solid #ccc;
  text-align:left;
}

th{
  background:#f2f2f2;
}

tr:nth-child(even){
  background:#fafafa;
}

.categoria-total{
  margin-top:15px;
  font-weight:bold;
}

a{
  display:block;
  margin-top:20px;
  text-align:center;
}

/* responsive */

@media (max-width:600px){

  table,thead,tbody,tr,td,th{
    display:block;
  }

  thead{
    display:none;
  }

  tr{
    margin-bottom:10px;
    border:1px solid #ddd;
    padding:10px;
  }

  td{
    border:none;
    padding:5px 0;
  }

}

</style>

</head>

<body>

<h1>Movimientos</h1>

<div class="topbar">

  <div class="total">
    Total general: <span id="total"></span>
  </div>

  <div class="filtro">
    Categoría:
    <select id="filtroCategoria">
      <option value="">Todas</option>
      <option value="1">INGRESO</option>
      <option value="2">COMIDA</option>
      <option value="3">TRANSPORTE</option>
      <option value="4">SERVICIOS</option>
      <option value="5">VIVIENDA</option>
      <option value="6">ROPA</option>
      <option value="7">ENTRETENIMIENTO</option>
      <option value="8">SALUD</option>
      <option value="9">EDUCACION</option>
      <option value="10">EXTRAS</option>
    </select>
  </div>

</div>

<table id="tabla">

<thead>
<tr>
<th>Fecha</th>
<th>Motivo</th>
<th>Cantidad</th>
<th>Categoría</th>
</tr>
</thead>

<tbody></tbody>

</table>

<div class="categoria-total">
Total categoría: <span id="totalCategoria">0</span>
</div>

<a href="/register.html">Registrar movimiento</a>

<script>

const categorias = {
  1: "INGRESO",
  2: "COMIDA",
  3: "TRANSPORTE",
  4: "SERVICIOS",
  5: "VIVIENDA",
  6: "ROPA",
  7: "ENTRETENIMIENTO",
  8: "SALUD",
  9: "EDUCACION",
  10: "EXTRAS"
};

let movimientosGlobal = [];

/* total general */

async function cargarTotal(){

  const res = await fetch('/api/total');
  const data = await res.json();

  document.getElementById('total').textContent = data.total ?? 0;

}

/* cargar movimientos */

async function cargarMovimientos(){

  const res = await fetch('/api/movimientos');
  movimientosGlobal = await res.json();

  renderTabla(movimientosGlobal);

}

/* renderizar tabla */

function renderTabla(lista){

  const tabla = document.querySelector('#tabla tbody');
  tabla.innerHTML = '';

  let sumaCategoria = 0;

  lista.forEach(mov => {

    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${new Date(mov.fecha).toLocaleString()}</td>
      <td>${mov.motivo}</td>
      <td>${mov.cantidad}</td>
      <td>${categorias[mov.categoria_id]}</td>
    `;

    tabla.appendChild(tr);

    sumaCategoria += Number(mov.cantidad);

  });

  document.getElementById('totalCategoria').textContent = sumaCategoria;

}

/* filtro por categoria */

document.getElementById('filtroCategoria').addEventListener('change', e => {

  const categoria = e.target.value;

  if(!categoria){

    renderTabla(movimientosGlobal);
    return;

  }

  const filtrados = movimientosGlobal.filter(
    m => m.categoria_id == categoria
  );

  renderTabla(filtrados);

});

/* inicializar */

cargarTotal();
cargarMovimientos();

</script>

</body>
</html>
